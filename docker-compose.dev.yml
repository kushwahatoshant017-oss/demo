version: '3.8'

services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: weathersphere-api-dev
    ports:
      - "4000:4000"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://weathersphere:weathersphere123@postgres:5432/weathersphere
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - weathersphere-network

  postgres:
    image: postgres:16-alpine
    container_name: weathersphere-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=weathersphere
      - POSTGRES_PASSWORD=weathersphere123
      - POSTGRES_DB=weathersphere
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weathersphere"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - weathersphere-network

  redis:
    image: redis:7-alpine
    container_name: weathersphere-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - weathersphere-network

volumes:
  postgres-data-dev:
  redis-data-dev:

networks:
  weathersphere-network:
    driver: bridge
